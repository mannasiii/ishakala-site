<script>
function sendProductToWhatsApp(element) {
  const wrapper = element.closest('.col-lg-4, .col-md-6, .col-sm-12').querySelector('.exp-services-wrapper');

  const name = wrapper.getAttribute('data-product') || "a product";
  const price = wrapper.getAttribute('data-price') || "Price on request";
  const link = wrapper.getAttribute('data-link') || window.location.href;
  const size = wrapper.getAttribute('data-size') || "";

  // Format the message
  const message = `Hello, I am interested in the following product:\n\n🛍️ *${name}*\n💰 ${price}\n🔗 ${link}\n${size ? "📦 " + size : ""}\n\nPlease share more details.`;

  const encoded = encodeURIComponent(message);
  const phoneNumber = "+917972432946";
  const whatsappURL = `https://wa.me/${phoneNumber}?text=${encoded}`;

  window.open(whatsappURL, '_blank');
}
</script>
